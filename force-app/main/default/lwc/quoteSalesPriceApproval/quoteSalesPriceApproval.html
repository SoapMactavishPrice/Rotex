<template>
    <lightning-card>
        <!-- ── Card Header ── -->
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium slds-p-bottom_small slds-p-top_x-small">
            <span></span>
            <h4 style="font-size: 22px; font-weight: 700; color: #181818; letter-spacing: -0.3px;">
                Quote Approvals
            </h4>
            <lightning-input
                type="toggle"
                label="Skip SOA"
                checked={skipSoaRestrictions}
                onchange={handleToggleSkipSoaRestrictions}
                message-toggle-active=""
                message-toggle-inactive="">
            </lightning-input>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
        </template>

        <template if:true={quotes}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">

                <template for:each={quotes} for:item="quote">
                    <div key={quote.quoteId} class="slds-m-bottom_medium quote-panel">

                        <!-- ── Quote Header ── -->
                        <div class="quote-header">
                            <div class="quote-header-grid">
                                <div class="header-field">
                                    <span class="field-label">Quote No.</span>
                                    <span class="field-value">
                                        {quote.quoteNumber}
                                        <a href="javascript:void(0);"
                                            data-quote-id={quote.quoteId}
                                            onclick={handleToggleExpand}
                                            class="action-link">
                                            <template if:false={quote.isExpanded}>(open)</template>
                                            <template if:true={quote.isExpanded}>(close)</template>
                                        </a>
                                        <a href={quote.quoteRecordUrl} target="_blank" class="action-link">(view)</a>
                                    </span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Customer Name</span>
                                    <span class="field-value">{quote.accountName}</span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Total Value</span>
                                    <span class="field-value">{quote.totalValue}</span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Rev No.</span>
                                    <span class="field-value">{quote.revNo}</span>
                                </div>

                                <div class="header-field">
                                    <span class="field-label">Validity of Offer</span>
                                    <span class="field-value">{quote.validityOfOffer}</span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Payment Terms</span>
                                    <span class="field-value">{quote.paymentTerms}</span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Warranty Terms</span>
                                    <span class="field-value">{quote.warrantyTerms}</span>
                                </div>
                                <div class="header-field">
                                    <span class="field-label">Delivery Period</span>
                                    <span class="field-value">{quote.deliveryPeriod}</span>
                                </div>
                            </div>
                        </div>

                        <!-- ── Line Items Table (Collapsible) ── -->
                        <template if:true={quote.isExpanded}>
                            
                            <!-- ── Warranty Approval Section (50/50 Layout) ── -->
                            <template if:true={quote.showApprovalDashboard}>
                                <div class="combined-approval-container">
                                    <div class="combined-approval-table-wrap">
                                        <table class="combined-approval-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" class="approval-type-col">Approval Type</th>
                                                    <th scope="col" class="approval-value-col">Current Value</th>
                                                    <th scope="col" class="approval-value-col">Requested Value</th>
                                                    <template for:each={quote.approvalColumns} for:item="column">
                                                        <th scope="col" key={column.key} class="approver-col">{column.label}</th>
                                                    </template>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={quote.approvalDashboardRows} for:item="approvalRow">
                                                    <tr key={approvalRow.statusKey}>
                                                        <td rowspan="3" class="approval-type-cell">{approvalRow.label}</td>
                                                        <td rowspan="3" class="approval-value-cell">{approvalRow.currentValue}</td>
                                                        <td rowspan="3" class="approval-value-cell">{approvalRow.requestedValue}</td>
                                                        <template for:each={approvalRow.approvers} for:item="approver">
                                                            <td key={approver.statusKey} class="approval-status-cell">
                                                                <template if:true={approver.showStatusCombobox}>
                                                                    <lightning-combobox
                                                                        name="combinedApprovalStatus"
                                                                        data-quote-id={quote.quoteId}
                                                                        data-approval-type={approvalRow.type}
                                                                        data-field={approver.field}
                                                                        value={approver.status}
                                                                        options={statusOptions}
                                                                        onchange={handleCombinedApprovalStatusChange}
                                                                        variant="label-hidden"
                                                                        dropdown-alignment="auto">
                                                                    </lightning-combobox>
                                                                </template>
                                                                <template if:false={approver.showStatusCombobox}>
                                                                    <span class={approver.statusBadgeClass}>{approver.displayStatus}</span>
                                                                </template>
                                                            </td>
                                                        </template>
                                                    </tr>
                                                    <tr key={approvalRow.commentsKey}>
                                                        <template for:each={approvalRow.approvers} for:item="approver">
                                                            <td key={approver.commentsKey} class="approval-comment-cell">
                                                                <template if:true={approver.showCommentInput}>
                                                                    <lightning-textarea
                                                                        value={approver.comments}
                                                                        data-quote-id={quote.quoteId}
                                                                        data-approval-type={approvalRow.type}
                                                                        data-field={approver.field}
                                                                        onchange={handleCombinedApprovalCommentChange}
                                                                        variant="label-hidden"
                                                                        class="comment-input">
                                                                    </lightning-textarea>
                                                                </template>
                                                                <template if:false={approver.showCommentInput}>
                                                                    <span>{approver.comments}</span>
                                                                </template>
                                                            </td>
                                                        </template>
                                                    </tr>
                                                    <tr key={approvalRow.dateTimeKey}>
                                                        <template for:each={approvalRow.approvers} for:item="approver">
                                                            <td key={approver.dateTimeKey} class="approval-datetime-cell">{approver.dateTime}</td>
                                                        </template>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="combined-approval-footer">
                                        <lightning-button
                                            label="Submit"
                                            variant="brand"
                                            data-quote-id={quote.quoteId}
                                            onclick={handleCombinedApprovalSubmit}
                                            disabled={quote.isCombinedApprovalSubmitDisabled}>
                                        </lightning-button>
                                    </div>
                                </div>
                            </template>
                            <template if:true={quote.hasLineItems}>

                                <div class="table-container">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered approval-table">
                                        <thead>
                                            <tr>
                                                <th scope="col" class="product-col"
                                                    style="min-width: 160px; max-width: 200px; white-space: normal; word-wrap: break-word; word-break: break-word;">
                                                    Product Name
                                                </th>
                                                <th scope="col" class="list-price-col number-col"
                                                    style="min-width: 90px; white-space: nowrap;">
                                                    List Price
                                                </th>
                                                <th scope="col" class="quantity-col number-col">Qty</th>
                                                <th scope="col" class="sap-discount-col number-col">Disc. SAP</th>
                                                <th scope="col" class="previous-discount-col number-col">Prev. Disc.</th>
                                                <th scope="col" class="discount-col number-col">Discount</th>
                                                <th scope="col" class="soa-col">SOA</th>
                                                <th scope="col" class="status-col">Status</th>
                                                <th scope="col" class="datetime-col">Date / Time</th>
                                                <th scope="col" class="previous-comments-col">Previous Comments</th>
                                                <th scope="col" class="comments-col">Comments</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={quote.displayRows} for:item="row">
                                                <tr key={row.key} style={row.rowStyle}>
    
                                                    <!-- Product-level cells (merged rows) -->
                                                    <template if:true={row.isFirstRow}>
                                                        <td rowspan={row.soaCount} class="product-cell"
                                                            style="min-width: 160px; max-width: 200px; white-space: normal; word-wrap: break-word; word-break: break-word; overflow-wrap: break-word;">
                                                            {row.productName}
                                                        </td>
                                                        <td rowspan={row.soaCount} class="number-cell"
                                                            style="min-width: 90px; white-space: nowrap;">
                                                            {row.listPrice}
                                                        </td>
                                                        <td rowspan={row.soaCount} class="number-cell">
                                                            {row.quantity}
                                                        </td>
                                                        <td rowspan={row.soaCount} class="number-cell">
                                                            {row.d1}
                                                        </td>
                                                        <td rowspan={row.soaCount} class="number-cell">
                                                            {row.previousDiscount}
                                                        </td>
                                                        <td rowspan={row.soaCount} class="number-cell">
                                                            {row.d2}
                                                        </td>
                                                    </template>
    
                                                    <!-- SOA Label -->
                                                    <td class="soa-cell">
                                                        <span class="soa-cell">{row.soaDisplay}</span>
                                                    </td>
    
                                                    <!-- Status -->
                                                    <td class="status-cell">
                                                        <template if:true={row.showStatusCombobox}>
                                                            <lightning-combobox
                                                                name="ApprovalStatus"
                                                                data-parent={row.parentId}
                                                                data-id={row.quoteLineItemId}
                                                                data-field="approvalStatus"
                                                                data-stage-field={row.soaStatusField}
                                                                value={row.approvalStatus}
                                                                options={statusOptions}
                                                                onchange={handleLineItemChanges}
                                                                variant="label-hidden"
                                                                dropdown-alignment="auto">
                                                            </lightning-combobox>
                                                        </template>
                                                        <template if:true={row.showStatusText}>
                                                            <span class={row.statusBadgeClass}>{row.soaStatus}</span>
                                                        </template>
                                                    </td>
    
                                                    <!-- Date/Time -->
                                                    <td class="datetime-cell">{row.soaDateTime}</td>
    
                                                    <!-- Previous Comments -->
                                                    <td class="comment-cell previous-comment-cell">
                                                        <span>{row.prevSoaComments}</span>
                                                    </td>
    
                                                    <!-- Comments -->
                                                    <td class="comment-cell">
                                                        <template if:true={row.showCommentInput}>
                                                            <lightning-textarea
                                                                disabled={row.soaCommentsDisabled}
                                                                value={row.soaComments}
                                                                data-parent={row.parentId}
                                                                data-field={row.soaCommentsField}
                                                                data-id={row.quoteLineItemId}
                                                                oninput={handleLineItemChanges}
                                                                onchange={handleLineItemChanges}
                                                                variant="label-hidden"
                                                                class="comment-input">
                                                            </lightning-textarea>
                                                        </template>
                                                        <template if:false={row.showCommentInput}>
                                                            <span>{row.soaComments}</span>
                                                        </template>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </template>

                    </div>
                </template>

                <!-- ── Footer Buttons ── -->
                <div class="slds-m-top_medium slds-text-align_center action-footer">
                    <lightning-button
                        label="Cancel"
                        onclick={redirectToHome}
                        variant="neutral">
                    </lightning-button>
                    <lightning-button
                        label="Submit"
                        onclick={saveChanges}
                        variant="brand"
                        disabled={isSubmitDisabled}>
                    </lightning-button>
                </div>

            </div>
        </template>
    </lightning-card>
</template>
