<template>
    <lightning-card>
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium slds-p-bottom_medium">
            <span></span>
            <h4 style="font-size: 24px; font-weight: bold;">Quote Discount Approval</h4>
            <lightning-button label="Skip SOA Restrictions" onclick={handleSkipSoaRestrictions}
                variant="neutral"></lightning-button>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
        </template>

        <template if:true={quotes}>
            <template for:each={quotes} for:item="quote">
                <div key={quote.quoteId} class="slds-box slds-m-bottom_medium quote-panel">
                    <h3 class="slds-text-heading_small quote-summary">
                        <div class="quote-summary-grid">
                            <span><b>Account Name:</b> {quote.accountName}</span>
                            <span><b>Quote Owner:</b> {quote.quoteOwnerName}</span>
                            <span>
                                <b>Quote Number:&nbsp;</b>
                                <a href={quote.quoteRecordUrl} target="_blank"
                                    style="color: #0070d2; text-decoration: underline;">
                                    {quote.quoteNumber} (click here to view)
                                </a>
                            </span>
                            <span><b>Quote Name:</b> {quote.quoteName}</span>
                        </div>
                    </h3>

                    <div class="table-container">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered approval-table">
                            <thead>
                                <tr>
                                    <th scope="col" class="product-col">Product Name</th>
                                    <th scope="col" class="list-price-col number-col">List Price</th>
                                    <th scope="col" class="quantity-col number-col">Qty</th>
                                    <th scope="col" class="sap-discount-col number-col">Disc. SAP</th>
                                    <th scope="col" class="previous-discount-col number-col">Prev. Disc.</th>
                                    <th scope="col" class="discount-col number-col">Discount</th>
                                    <th scope="col" class="soa-col">SOA</th>
                                    <th scope="col" class="status-col">Status</th>
                                    <th scope="col" class="datetime-col">Date/Time</th>
                                    <th scope="col" class="previous-comments-col">Previous Comments</th>
                                    <th scope="col" class="comments-col">Comments</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={quote.displayRows} for:item="row">
                                    <tr key={row.key} style={row.rowStyle} >
                                        <template if:true={row.isFirstRow}>
                                            <td rowspan={row.soaCount} class="product-cell">
                                                {row.productName}
                                            </td>
                                            <td rowspan={row.soaCount} class="number-cell">
                                                {row.listPrice}
                                            </td>
                                            <td rowspan={row.soaCount} class="number-cell">
                                                {row.quantity}
                                            </td>
                                            <td rowspan={row.soaCount} class="number-cell">
                                                {row.d1}
                                            </td>
                                            <td rowspan={row.soaCount} class="number-cell">
                                                {row.previousDiscount}
                                            </td>
                                            <td rowspan={row.soaCount} class="number-cell">
                                                {row.d2}
                                            </td>
                                        </template>

                                        <!-- SOA Label -->
                                        <td class="soa-cell">{row.soaDisplay}</td>

                                        <!-- Status: combobox for current user editable row, plain text otherwise -->
                                        <td class="status-cell">
                                            <template if:true={row.showStatusCombobox}>
                                                <lightning-combobox
                                                    name="ApprovalStatus"
                                                    data-parent={row.parentId}
                                                    data-id={row.quoteLineItemId}
                                                    data-field="approvalStatus"
                                                    data-stage-field={row.soaStatusField}
                                                    value={row.approvalStatus}
                                                    options={statusOptions}
                                                    onchange={handleLineItemChanges}
                                                    variant="label-hidden"
                                                    dropdown-alignment="auto">
                                                </lightning-combobox>
                                            </template>
                                            <template if:true={row.showStatusText}>
                                                <span>{row.soaStatus}</span>
                                            </template>
                                        </td>

                                        <!-- Date/Time -->
                                        <td class="datetime-cell">{row.soaDateTime}</td>

                                        <!-- Previous Comments -->
                                        <td class="comment-cell previous-comment-cell">
                                            <span>{row.prevSoaComments}</span>
                                        </td>

                                        <!-- Comments: textarea for current user row, plain text for others -->
                                        <td class="comment-cell">
                                            <template if:true={row.showCommentInput}>
                                                <lightning-textarea
                                                    disabled={row.soaCommentsDisabled}
                                                    value={row.soaComments}
                                                    data-parent={row.parentId}
                                                    data-field={row.soaCommentsField}
                                                    data-id={row.quoteLineItemId}
                                                    oninput={handleLineItemChanges}
                                                    onchange={handleLineItemChanges}
                                                    variant="label-hidden"
                                                    class="comment-input">
                                                </lightning-textarea>
                                            </template>
                                            <template if:false={row.showCommentInput}>
                                                <span>{row.soaComments}</span>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <div class="slds-m-top_medium slds-text-align_center">
                <lightning-button label="Cancel" onclick={redirectToHome} variant="neutral"></lightning-button>
                <lightning-button class="slds-m-left_small" label="Submit" onclick={saveChanges}
                    variant="brand" disabled={isSubmitDisabled}></lightning-button>
            </div>
        </template>
    </lightning-card>
</template>
