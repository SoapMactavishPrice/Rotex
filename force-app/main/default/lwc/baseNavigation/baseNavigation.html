<template>
    <div class="sidebar">

        <!-- LOGO -->
        <div class="logo-section">
            <img src={logoUrl} class="logo"/>
        </div>
<br>

        <!-- MENU -->
        <template if:true={isNavReady}>
            <ul class="menu-list">

                <template
                    for:each={processedMenuItems}
                    for:item="item">

                    <li key={item.id}>

                        <c-main-navigation
                            item={item}
                            active-item-id={activeItemId}
                            onitemselected={handleItemSelected}>
                        </c-main-navigation>

                    </li>

                </template>

            </ul>
        </template>

        <!-- FOOTER -->
        <div class="sidebar-footer">

            <div class="user-avatar">
                {currentUserInitials}
            </div>

            <div class="user-info">

                <div class="user-name">
                    {currentUserName}
                </div>
            
                <template if:true={currentAccountName}>
                    <div class="user-account">
                        {currentAccountName}
                    </div>
                </template>
            
            </div>
           <lightning-icon
    icon-name="utility:logout"
    size="x-small"
    class="logout-icon"
    onclick={handleLogout}>
</lightning-icon>

        </div>

    </div>
</template>
