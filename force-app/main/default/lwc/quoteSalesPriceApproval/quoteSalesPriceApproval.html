<template>
    <lightning-card>
        <!-- ── Card Header ── -->
        <div class="header-container">
            <h4 class="header-title">
                Quote Approvals
            </h4>

            <lightning-input
                if:true={showSkipSOAButton}
                type="toggle"
                label="Skip SOA"
                checked={skipSoaRestrictions}
                onchange={handleToggleSkipSoaRestrictions}
                message-toggle-active=""
                message-toggle-inactive="">
            </lightning-input>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
        </template>

        <template if:true={quotes}>
            <!-- ── Tab Navigation ── -->
            <div class="tab-nav-container">
                <button class={pendingTabClass} onclick={handleTabChange} data-tab="pending">
                    My Pending
                    <span class="tab-badge">{pendingCount}</span>
                </button>
                <button class={allTabClass} onclick={handleTabChange} data-tab="all">
                    All Pending
                    <span class="tab-badge">{allCount}</span>
                </button>
                <button class={approvedTabClass} onclick={handleTabChange} data-tab="approved">
                    Approved
                    <span class="tab-badge">{approvedCount}</span>
                </button>
                <button class={rejectedTabClass} onclick={handleTabChange} data-tab="rejected">
                    Rejected
                    <span class="tab-badge">{rejectedCount}</span>
                </button>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium slds-p-top_small">

                <template if:true={hasFilteredQuotes}>
                <template for:each={filteredQuotes} for:item="quote">
                    <div key={quote.quoteId} class="slds-m-bottom_medium quote-panel">

                        <!-- ── Quote Header ── -->
                        <div class={quote.quoteHeaderClass}>
                            <div class="quote-header-inner">
                                <div class="quote-header-grid">
                                    <div class="header-field">
                                        <span class="field-label">Quote No.</span>
                                        <span class="field-value">
                                            {quote.quoteNumber}
                                            <!-- CHANGE 1: (open)/(close) link replaces chevron toggle -->
                                            <template if:false={quote.isExpanded}>
                                                <a
                                                    data-quote-id={quote.quoteId}
                                                    onclick={handleToggleExpand}
                                                    class="action-link"
                                                    style="cursor: pointer;">(open)</a>
                                            </template>
                                            <template if:true={quote.isExpanded}>
                                                <a
                                                    data-quote-id={quote.quoteId}
                                                    onclick={handleToggleExpand}
                                                    class="action-link"
                                                    style="cursor: pointer;">(close)</a>
                                            </template>
                                            <a href={quote.quoteRecordUrl} target="_blank" class="action-link">(view)</a>
                                        </span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Customer Name</span>
                                        <span class="field-value">{quote.accountName}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Total Value</span>
                                        <span class="field-value">{quote.totalValue}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Avg. Discount Requested</span>
                                        <span class="field-value">{quote.avgDiscountRequested}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Avg. Discount Approved</span>
                                        <span class="field-value">{quote.avgDiscountApproved}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Rev No.</span>
                                        <span class="field-value">{quote.revNo}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Validity of Offer</span>
                                        <span class="field-value">{quote.validityOfOffer}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Payment Terms</span>
                                        <span class="field-value">{quote.paymentTerms}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Warranty Terms</span>
                                        <span class="field-value">{quote.warrantyTerms}</span>
                                    </div>
                                    <div class="header-field">
                                        <span class="field-label">Delivery Period</span>
                                        <span class="field-value">{quote.deliveryPeriod}</span>
                                    </div>
                                </div>
                                <!-- CHANGE 1: chevron toggle div removed entirely -->
                            </div>
                        </div>

                        <!-- ── Line Items Table (Collapsible) ── -->
                        <template if:true={quote.isExpanded}>

                            <!-- ── Combined Approval Dashboard ── -->
                            <template if:true={quote.showApprovalDashboard}>
                                <div class="combined-approval-container">
                                    <div class="combined-approval-table-wrap">
                                        <table class="combined-approval-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" class="approval-type-col">Approval Type</th>
                                                    <th scope="col" class="approval-value-col">Current Value</th>
                                                    <th scope="col" class="approval-value-col">Requested Value</th>
                                                    <template for:each={quote.approvalColumns} for:item="column">
                                                        <th scope="col" key={column.key} class="approver-col">{column.label}</th>
                                                    </template>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={quote.approvalDashboardRows} for:item="approvalRow">

                                                    <!-- Row 1: Status + DateTime stacked -->
                                                    <tr key={approvalRow.statusKey}>

                                                        <td class="approval-type-cell" style="text-align: center;">
                                                            {approvalRow.label}
                                                        </td>

                                                        <td class="approval-value-cell">
                                                            {approvalRow.currentValue}
                                                        </td>

                                                        <td class="approval-value-cell">

                                                            <template if:true={approvalRow.showRequestedValueCombobox}>
                                                                <lightning-combobox
                                                                    name="requestedApprovalValue"
                                                                    data-quote-id={quote.quoteId}
                                                                    data-approval-type={approvalRow.type}
                                                                    value={approvalRow.requestedValue}
                                                                    options={approvalRow.requestedValueOptions}
                                                                    onchange={handleRequestedApprovalValueChange}
                                                                    variant="label-hidden"
                                                                    dropdown-alignment="auto">
                                                                </lightning-combobox>
                                                            </template>

                                                            <template if:false={approvalRow.showRequestedValueCombobox}>
                                                                {approvalRow.requestedValue}
                                                            </template>

                                                        </td>

                                                        <template for:each={approvalRow.approvers} for:item="approver">

                                                            <td key={approver.statusKey} class={approver.statusCellClass}>

                                                                <template if:true={approver.showStatusCombobox}>
                                                                    <lightning-combobox
                                                                        name="combinedApprovalStatus"
                                                                        data-quote-id={quote.quoteId}
                                                                        data-approval-type={approvalRow.type}
                                                                        data-field={approver.field}
                                                                        value={approver.status}
                                                                        options={statusOptions}
                                                                        onchange={handleCombinedApprovalStatusChange}
                                                                        variant="label-hidden"
                                                                        dropdown-alignment="auto">
                                                                    </lightning-combobox>
                                                                </template>

                                                                <template if:false={approver.showStatusCombobox}>
                                                                    <template if:false={approver.isBeyondFinalApprover}>
                                                                        <span class={approver.statusBadgeClass}>
                                                                            {approver.displayStatus}
                                                                        </span>
                                                                    </template>
                                                                </template>

                                                                <template if:true={approver.dateTime}>
                                                                    <div class="approval-datetime-inline">
                                                                        {approver.dateTime}
                                                                    </div>
                                                                </template>

                                                                <template if:true={approver.showCommentInput}>
                                                                    <div class="approval-comment-inline">
                                                                        <lightning-textarea
                                                                            value={approver.comments}
                                                                            data-quote-id={quote.quoteId}
                                                                            data-approval-type={approvalRow.type}
                                                                            data-field={approver.field}
                                                                            onchange={handleCombinedApprovalCommentChange}
                                                                            variant="label-hidden"
                                                                            class="comment-input">
                                                                        </lightning-textarea>
                                                                    </div>
                                                                </template>

                                                                <template if:false={approver.showCommentInput}>
                                                                    <template if:true={approver.comments}>
                                                                        <div class="approval-comment-inline">
                                                                            {approver.comments}
                                                                        </div>
                                                                    </template>
                                                                </template>

                                                            </td>

                                                        </template>

                                                    </tr>

                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </template>

                            <!-- ── Discount Line Items Table ── -->
                            <template if:true={quote.hasLineItems}>
                                <div class="table-container">
                                    <table style="width:100%; table-layout:auto; border-collapse:collapse; border:1px solid #000; font-size:12px; color:#3e3e3c;">
                                        <thead>
                                            <tr style="background-color:#007764;">
                                                <th scope="col" style="width:10%; border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left; white-space:normal; word-break:break-word;">Product Name</th>
                                                <th scope="col" style="width:8%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center; white-space:normal; word-break:break-word;">Product Code</th>
                                                <th scope="col" style="width:4%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center;">List Price</th>
                                                <th scope="col" style="width:3%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center;">Qty</th>
                                                <th scope="col" style="width:4%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center;">Disc. SAP%</th>
                                                <th scope="col" style="width:4%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center;">Pr. Disc.%</th>
                                                <th scope="col" style="width:7%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center;">Disc.%</th>
                                                <th scope="col" style="width:10%; border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left;">SOA User</th>
                                                <th scope="col" style="width:8%;  border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left;">Status</th>
                                                <th scope="col" style="width:10%; border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left;">Requestor Comments</th>
                                                <th scope="col" style="width:16%; border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left;">Previous Approver Comments</th>
                                                <th scope="col" style="width:21%; border:1px solid #000; padding:8px 7px; font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:left;">Approver Comments</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={quote.displayRows} for:item="row">
                                                <tr key={row.key}>

                                                    <!-- Product-level cells (merged rows) -->
                                                    <template if:true={row.isFirstRow}>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; white-space:normal; word-break:break-word; overflow-wrap:break-word;">{row.productName}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center; color:#706e6b; font-size:13px; white-space:normal; word-break:break-word;">{row.productCode}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center;">{row.listPrice}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center;">{row.quantity}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center;">{row.d1}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center;">{row.previousDiscount}</td>
                                                        <td rowspan={row.soaCount} style="border:1px solid #000; padding:8px; vertical-align:middle; text-align:center;">
                                                            <template if:true={row.showDiscountInput}>
                                                                <lightning-input
                                                                    type="number"
                                                                    value={row.d2}
                                                                    data-parent={row.parentId}
                                                                    data-id={row.quoteLineItemId}
                                                                    data-field="d2"
                                                                    onchange={handleLineItemChanges}
                                                                    variant="label-hidden"
                                                                    step="0.01"
                                                                    min="0">
                                                                </lightning-input>
                                                            </template>
                                                            <template if:false={row.showDiscountInput}>
                                                                {row.d2}
                                                            </template>
                                                        </td>
                                                    </template>

                                                    <!-- SOA Label — no CSS class on span, all inline -->
                                                    <td style="border:1px solid #000; padding:8px; vertical-align:top;">
                                                        <span style="color:#444; font-weight:600; font-size:11.5px; white-space:pre-wrap; overflow-wrap:anywhere;">{row.soaDisplay}</span>
                                                    </td>

                                                    <!-- Status -->
                                                    <td style="border:1px solid #000; padding:8px; vertical-align:top;">
                                                        <template if:true={row.showStatusCombobox}>
                                                            <lightning-combobox name="ApprovalStatus" data-parent={row.parentId} data-id={row.quoteLineItemId} data-field="approvalStatus" data-stage-field={row.soaStatusField} value={row.approvalStatus} options={statusOptions} onchange={handleLineItemChanges} variant="label-hidden" dropdown-alignment="auto"></lightning-combobox>
                                                        </template>
                                                        <template if:true={row.showStatusText}>
                                                            <span class={row.statusBadgeClass}>{row.soaStatus}</span>
                                                        </template>
                                                        <template if:true={row.soaDateTime}>
                                                            <div style="font-size:11px; color:#706e6b; white-space:nowrap; margin-top:4px;">{row.soaDateTime}</div>
                                                        </template>
                                                    </td>
                                                    <td style="border:1px solid #000; padding:8px; vertical-align:top;">
                                                        <span style="white-space:pre-wrap; overflow-wrap:anywhere; display:block; color:#3e3e3c; line-height:1.45;">{row.requestedComments}</span>
                                                    </td>
                                                    <!-- Previous Comments -->
                                                    <td style="border:1px solid #000; padding:8px; vertical-align:top;">
                                                        <span style="white-space:pre-wrap; overflow-wrap:anywhere; display:block; color:#3e3e3c; line-height:1.45;">{row.prevSoaComments}</span>
                                                    </td>

                                                    <!-- Comments -->
                                                    <td style="border:1px solid #000; padding:8px; vertical-align:top;">
                                                        <template if:true={row.showCommentInput}>
                                                            <lightning-textarea
                                                                disabled={row.soaCommentsDisabled}
                                                                value={row.soaComments}
                                                                data-parent={row.parentId}
                                                                data-field={row.soaCommentsField}
                                                                data-id={row.quoteLineItemId}
                                                                oninput={handleLineItemChanges}
                                                                onchange={handleLineItemChanges}
                                                                variant="label-hidden"
                                                                class="comment-input">
                                                            </lightning-textarea>
                                                        </template>
                                                        <template if:false={row.showCommentInput}>
                                                            <span style="white-space:pre-wrap; overflow-wrap:anywhere; display:block; color:#3e3e3c; line-height:1.45;">{row.soaComments}</span>
                                                        </template>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>

                            <!-- ── Submit Button (hidden in Approved/Rejected tabs) ── -->
                            <template if:false={isApprovedOrRejectedTab}>
                            <div class="slds-m-top_medium slds-text-align_center slds-p-horizontal_medium slds-p-bottom_medium submit-btn-wrap">
                                <lightning-button
                                    label="Submit"
                                    variant="brand"
                                    data-quote-id={quote.quoteId}
                                    onclick={handleUnifiedQuoteSubmit}
                                    disabled={quote.isUnifiedSubmitDisabled}>
                                </lightning-button>
                            </div>
                            </template>

                        </template>
                        <!-- ── End Collapsible ── -->

                    </div>
                </template>
                </template>
                <!-- ── Empty State ── -->
                <template if:false={hasFilteredQuotes}>
                    <div class="tab-empty-state">
                        <p>No quotes found for the selected filter.</p>
                    </div>
                </template>

                <!-- ── Footer Buttons ── -->
                <div class="slds-m-top_medium slds-text-align_center action-footer">
                    <lightning-button
                        label="Cancel"
                        onclick={redirectToHome}
                        variant="neutral">
                    </lightning-button>
                </div>

            </div>
        </template>
    </lightning-card>
</template>
